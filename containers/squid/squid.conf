# Ur forward proxy — baked into the ur-squid image.
# Only allowlist.txt is mounted at runtime.
http_port 3128

# Domain-based allowlist (runtime-mounted, one domain per line).
acl allowed_domains dstdomain "/etc/squid/allowlist.txt"

# URL-based allowlist for paths under domains that are too broad to allow entirely.
# Claude Code distribution bucket on Google Cloud Storage.
acl allowed_urls url_regex ^https://storage\.googleapis\.com/claude-code-dist-86c565f3-f756-42ad-8dfa-d59b1c096819/

acl CONNECT method CONNECT

# Allow CONNECT tunnels to domain-allowlisted hosts.
http_access allow CONNECT allowed_domains
# Allow CONNECT tunnels to storage.googleapis.com for the GCS bucket.
acl gcs_domain dstdomain storage.googleapis.com
http_access allow CONNECT gcs_domain

# Allow matching requests through.
http_access allow allowed_domains
http_access allow allowed_urls
http_access deny all

access_log stdio:/var/log/squid/access.log
cache_log /var/log/squid/cache.log
cache deny all
via off
forwarded_for delete
