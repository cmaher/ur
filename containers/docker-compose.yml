# Docker Compose template for the ur server.
#
# Worker containers are NOT defined here — they are launched dynamically
# by the server via ProcessManager using the Docker socket.
#
# `ur init` renders this template, replacing {{NETWORK_NAME}} and
# {{WORKER_NETWORK_NAME}} with values from ur.toml (or defaults).
#
# Network topology:
#   {{NETWORK_NAME}}        — internet-connected bridge (server + squid)
#   {{WORKER_NETWORK_NAME}} — internal bridge, no internet (server + squid + workers)
# Workers only join the worker network; all outbound traffic goes through squid.

services:
  ur-squid:
    image: ur-squid:latest
    container_name: ur-squid
    volumes:
      - ${UR_CONFIG:-~/.ur}/squid/allowlist.txt:/etc/squid/allowlist.txt:ro
    networks:
      - infra
      - workers
    restart: unless-stopped

  ur-server:
    image: ur-server:latest
    container_name: ur-server
    restart: unless-stopped

    # Docker socket — server shells out to `docker` CLI to manage worker containers
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${UR_CONFIG:-~/.ur}:/config
      - ${UR_WORKSPACE:-~/.ur/workspace}:/workspace

    environment:
      # Point server at the mounted config directory inside the container
      - UR_CONFIG=/config
      # Host-side config path for constructing agent container volume mounts
      - UR_HOST_CONFIG=${UR_CONFIG:-~/.ur}
      # GitHub authentication (forwarded from host)
      - UR_HOSTD_ADDR=http://host.docker.internal:${UR_HOSTD_PORT:-42070}
      - GH_TOKEN=${GH_TOKEN:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}

    extra_hosts:
      - "host.docker.internal:host-gateway"

    # Healthcheck so `docker compose up --wait` waits for the gRPC server to be ready,
    # not just the container to be in "running" state.
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 ${UR_SERVER_PORT:-42069} || exit 1"]
      interval: 1s
      timeout: 2s
      retries: 10
      start_period: 3s

    # gRPC server port (ur CLI → server) + forward proxy port (workers → internet)
    ports:
      - "${UR_SERVER_PORT:-42069}:${UR_SERVER_PORT:-42069}"

    networks:
      - infra
      - workers

networks:
  # Internet-connected bridge for server + squid upstream access.
  infra:
    driver: bridge
    name: {{NETWORK_NAME}}
  # Internal bridge for workers — no outbound internet.
  # Workers reach server + squid via Docker DNS here.
  workers:
    driver: bridge
    name: {{WORKER_NETWORK_NAME}}
    internal: true
