# Docker Compose template for the ur server.
#
# Worker containers are NOT defined here — they are launched dynamically
# by the server via ProcessManager using the Docker socket.
#
# Usage:
#   docker compose -f containers/docker-compose.yml up -d
#
# The ur-server service name doubles as its Docker DNS hostname, which must match
# ur_config::DEFAULT_SERVER_HOSTNAME ("ur-server") so worker containers can reach
# the server and proxy via Docker internal DNS on the shared "ur" network.

services:
  ur-server:
    image: ur-server:latest
    container_name: ur-server
    restart: unless-stopped

    # Docker socket — server shells out to `docker` CLI to manage worker containers
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${UR_CONFIG:-~/.ur}:/config
      - ${UR_WORKSPACE:-~/.ur/workspace}:/workspace

    environment:
      # Point server at the mounted config directory inside the container
      - UR_CONFIG=/config
      # GitHub authentication (forwarded from host)
      - GH_TOKEN=${GH_TOKEN:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}

    # gRPC server port (ur CLI → server) + forward proxy port (workers → internet)
    ports:
      - "${UR_SERVER_PORT:-42069}:${UR_SERVER_PORT:-42069}"

    networks:
      - ur

networks:
  # Shared bridge network for server + dynamically launched worker containers.
  # Name matches ur_config::DEFAULT_NETWORK_NAME.
  ur:
    driver: bridge
    name: ur
