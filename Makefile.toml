# Keep tasks small and composable. Inline scripts go in scripts/build/.

[config]
default_to_workspace = false

[tasks.fmt]
description = "Auto-fix formatting, then fail if changes were needed"
script_runner = "@shell"
script = ["""
if ! cargo fmt --all --check >/dev/null 2>&1; then
    cargo fmt --all >/dev/null 2>&1
    echo "error: formatting was incorrect. Files are already fixed on disk. Stage, commit, and push again."
    exit 1
fi
"""]

[tasks.fmt-fix]
description = "Fix code formatting"
command = "cargo"
args = ["fmt", "--all"]

[tasks.clippy]
description = "Run clippy lints on all workspace crates"
command = "cargo"
args = ["clippy", "--workspace", "--all-targets", "--all-features", "--", "-D", "warnings", "-W", "clippy::excessive_nesting"]

[tasks.build]
description = "Build all workspace crates"
command = "cargo"
args = ["build", "--workspace", "--all-features"]

[tasks.test]
description = "Run tests on all workspace crates"
command = "cargo"
args = ["test", "--workspace"]

[tasks.audit]
description = "Run cargo audit for dependency vulnerabilities"
command = "cargo"
args = ["audit"]

[tasks.stage-workercmd]
description = "Cross-compile workercmd binaries for linux-gnu and stage for Dockerfile (requires zig + cargo-zigbuild)"
script_runner = "@shell"
script = ["scripts/build/stage-workercmd.sh"]

[tasks.stage-workercmd-native]
description = "Build workercmd binaries natively and stage for Dockerfile (for Linux CI)"
script_runner = "@shell"
script = ["scripts/build/stage-workercmd-native.sh"]

[tasks.stage-server]
description = "Cross-compile ur-server binary for linux-musl (Alpine) and stage for Dockerfile (requires zig + cargo-zigbuild)"
script_runner = "@shell"
script = ["scripts/build/stage-server.sh"]

[tasks.stage-server-native]
description = "Build ur-server binary for linux-musl (Alpine) and stage for Dockerfile (for Linux CI, requires zig + cargo-zigbuild)"
script_runner = "@shell"
script = ["scripts/build/stage-server-native.sh"]

[tasks.stage-builderd]
description = "Cross-compile builderd binary for linux-gnu (aarch64) and stage for container build context (requires zig + cargo-zigbuild)"
script_runner = "@shell"
script = ["scripts/build/stage-builderd.sh"]

[tasks.stage-builderd-native]
description = "Build builderd binary for linux-gnu (aarch64) and stage for container build context (for Linux CI, requires zig + cargo-zigbuild)"
script_runner = "@shell"
script = ["scripts/build/stage-builderd-native.sh"]

[tasks.image]
description = "Build all container images (worker + server)"
dependencies = ["stage-workercmd", "stage-server", "stage-builderd"]
script_runner = "@shell"
script = ["scripts/build/image.sh"]

[tasks.image-native]
description = "Build all container images using native compilation (for Linux CI)"
dependencies = ["stage-workercmd-native", "stage-server-native", "stage-builderd-native"]
script_runner = "@shell"
script = ["scripts/build/image.sh"]

[tasks.install]
description = "Build ur CLI + builderd, install to UR_INSTALL_DIR (default ~/bin), and build all container images"
dependencies = ["image"]
script_runner = "@shell"
script = ["scripts/build/install.sh"]

[tasks.install-debug]
description = "Same as install but with debug builds"
dependencies = ["image"]
env = { "UR_BUILD_PROFILE" = "debug" }
script_runner = "@shell"
script = ["scripts/build/install.sh"]

[tasks.acceptance]
description = "Build container images and run acceptance tests"
dependencies = ["image"]
command = "cargo"
args = ["test", "-p", "acceptance", "--features", "acceptance"]

[tasks.install-hooks]
description = "Install git hooks (pre-commit formats, pre-push runs CI + acceptance)"
script_runner = "@shell"
script = ["cp scripts/git-hooks/* .git/hooks/"]

[tasks.ci]
description = "Run all CI checks"
dependencies = ["fmt", "clippy", "build", "test"]
