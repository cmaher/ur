[config]
default_to_workspace = false

[env]
UR_CONTAINER = { value = "apple", condition = { platforms = ["mac"] } }

[tasks.fmt]
description = "Check code formatting"
command = "cargo"
args = ["fmt", "--all", "--check"]

[tasks.fmt-fix]
description = "Fix code formatting"
command = "cargo"
args = ["fmt", "--all"]

[tasks.clippy]
description = "Run clippy lints on all workspace crates"
command = "cargo"
args = ["clippy", "--workspace", "--all-targets", "--all-features", "--", "-D", "warnings", "-W", "clippy::excessive_nesting"]

[tasks.build]
description = "Build all workspace crates"
command = "cargo"
args = ["build", "--workspace", "--all-features"]

[tasks.test]
description = "Run tests on all workspace crates"
command = "cargo"
args = ["test", "--workspace"]

[tasks.audit]
description = "Run cargo audit for dependency vulnerabilities"
command = "cargo"
args = ["audit"]

[tasks.cross-agent-tools]
description = "Cross-compile agent_tools for linux-musl (matches host arch)"
script_runner = "@shell"
script = '''
ARCH=$(uname -m)
case "$ARCH" in
    arm64|aarch64) TARGET="aarch64-unknown-linux-musl" ;;
    x86_64)        TARGET="x86_64-unknown-linux-musl" ;;
    *)             echo "Unsupported architecture: $ARCH" >&2; exit 1 ;;
esac
echo "Cross-compiling agent_tools for $TARGET"
cargo build --release --target "$TARGET" -p agent_tools
cp "target/$TARGET/release/agent_tools" containers/claude-worker/agent_tools
echo "Copied agent_tools to containers/claude-worker/agent_tools"
'''

[tasks.ci]
description = "Run all CI checks"
dependencies = ["fmt", "clippy", "build", "test"]
