# Keep tasks small and composable. Inline scripts go in scripts/build/.

[config]
default_to_workspace = false

[tasks.fmt]
description = "Auto-fix formatting, then fail if changes were needed"
script_runner = "@shell"
script = ["""
if ! cargo fmt --all --check >/dev/null 2>&1; then
    cargo fmt --all >/dev/null 2>&1
    echo "error: formatting was incorrect. Files are already fixed on disk. Stage, commit, and push again."
    exit 1
fi
"""]

[tasks.fmt-fix]
description = "Fix code formatting"
command = "cargo"
args = ["fmt", "--all"]

[tasks.clippy]
description = "Run clippy lints on all workspace crates"
command = "cargo"
args = ["clippy", "--workspace", "--all-targets", "--all-features", "--", "-D", "warnings"]

[tasks.build]
description = "Build all workspace crates"
command = "cargo"
args = ["build", "--workspace", "--all-features"]

[tasks.test]
description = "Run tests on all workspace crates"
command = "cargo"
args = ["test", "--workspace"]

[tasks.audit]
description = "Run cargo audit for dependency vulnerabilities"
command = "cargo"
args = ["audit"]

[tasks.stage-workercmd]
description = "Build workercmd binaries and stage for Dockerfile (cross-compiles on macOS, native on Linux)"
script_runner = "@shell"
script = ["scripts/build/stage-workercmd.sh"]

[tasks.stage-workercmd-native]
description = "Build workercmd binaries natively and stage for Dockerfile (for Linux CI)"
script_runner = "@shell"
script = ["scripts/build/stage-workercmd-native.sh"]

[tasks.stage-server]
description = "Build ur-server binary and stage for Dockerfile (cross-compiles on macOS, native on Linux)"
script_runner = "@shell"
script = ["scripts/build/stage-server.sh"]

[tasks.stage-server-native]
description = "Build ur-server binary natively and stage for Dockerfile (for Linux CI)"
script_runner = "@shell"
script = ["scripts/build/stage-server-native.sh"]

[tasks.stage-builderd]
description = "Build builderd binary and stage for container build context (cross-compiles on macOS, native on Linux)"
script_runner = "@shell"
script = ["scripts/build/stage-builderd.sh"]

[tasks.stage-builderd-native]
description = "Build builderd binary natively and stage for container build context (for Linux CI)"
script_runner = "@shell"
script = ["scripts/build/stage-builderd-native.sh"]

[tasks.image]
description = "Build all container images (worker + server)"
dependencies = ["stage-workercmd", "stage-server", "stage-builderd"]
script_runner = "@shell"
script = ["scripts/build/image.sh"]

[tasks.image-native]
description = "Build all container images using native compilation (for Linux CI)"
dependencies = ["stage-workercmd-native", "stage-server-native", "stage-builderd-native"]
script_runner = "@shell"
script = ["scripts/build/image.sh"]

[tasks.install]
description = "Build ur CLI + builderd, install to UR_INSTALL_DIR (default ~/bin), and build all container images"
dependencies = ["image"]
script_runner = "@shell"
script = ["scripts/build/install.sh"]

[tasks.install-nocache]
description = "Same as install but force-rebuilds the base image (no Docker cache)"
dependencies = ["image-force-base"]
script_runner = "@shell"
script = ["scripts/build/install.sh"]

[tasks.image-force-base]
description = "Build all container images, force-rebuilding the base image (no Docker cache)"
dependencies = ["stage-workercmd", "stage-server", "stage-builderd"]
env = { "UR_FORCE_REBUILD_BASE" = "1" }
script_runner = "@shell"
script = ["scripts/build/image.sh"]

[tasks.install-debug]
description = "Same as install but with debug builds"
dependencies = ["image"]
env = { "UR_BUILD_PROFILE" = "debug" }
script_runner = "@shell"
script = ["scripts/build/install.sh"]

[tasks.acceptance]
description = "Build container images and run acceptance tests"
dependencies = ["image"]
command = "cargo"
args = ["test", "-p", "acceptance", "--features", "acceptance"]

[tasks.acceptance-ci]
description = "Build isolated CI-tagged images and run acceptance tests (cleans up after)"
dependencies = ["stage-workercmd", "stage-server", "stage-builderd"]
script_runner = "@shell"
script = ["scripts/acceptance-ci.sh"]

[tasks.install-hooks]
description = "Install git hooks (pre-commit formats, pre-push runs CI + acceptance)"
script_runner = "@shell"
script = ["cp ur-hooks/git/* .git/hooks/"]

[tasks.ci]
description = "Run all CI checks"
dependencies = ["fmt", "clippy", "build", "test"]

[tasks.fmt-fix-silent]
description = "Fix code formatting (no output)"
script_runner = "@shell"
script = ["cargo fmt --all >/dev/null 2>&1"]

[tasks.ci-fmt-fix]
description = "Auto-fix formatting silently, then run CI checks (clippy, build, test)"
dependencies = ["fmt-fix-silent", "clippy", "build", "test"]
