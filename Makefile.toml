# Keep tasks small and composable. Inline scripts go in scripts/build/.

[config]
default_to_workspace = false

[env]
UR_CONTAINER = { value = "apple", condition = { platforms = ["mac"] } }

[tasks.fmt]
description = "Check code formatting"
command = "cargo"
args = ["fmt", "--all", "--check"]

[tasks.fmt-fix]
description = "Fix code formatting"
command = "cargo"
args = ["fmt", "--all"]

[tasks.clippy]
description = "Run clippy lints on all workspace crates"
command = "cargo"
args = ["clippy", "--workspace", "--all-targets", "--all-features", "--", "-D", "warnings", "-W", "clippy::excessive_nesting"]

[tasks.build]
description = "Build all workspace crates"
command = "cargo"
args = ["build", "--workspace", "--all-features"]

[tasks.test]
description = "Run tests on all workspace crates"
command = "cargo"
args = ["test", "--workspace"]

[tasks.audit]
description = "Run cargo audit for dependency vulnerabilities"
command = "cargo"
args = ["audit"]

[tasks.stage-workercmd]
description = "Cross-compile workercmd binaries for linux-gnu and stage for Dockerfile (requires zig + cargo-zigbuild)"
script_runner = "@shell"
script = ["scripts/build/stage-workercmd.sh"]

[tasks.stage-workercmd-native]
description = "Build workercmd binaries natively and stage for Dockerfile (for Linux CI)"
script_runner = "@shell"
script = ["scripts/build/stage-workercmd-native.sh"]

[tasks.container-image]
description = "Build worker container image using the available container runtime"
dependencies = ["stage-workercmd"]
script_runner = "@shell"
script = ["scripts/build/container-image.sh"]

[tasks.install]
description = "Build release binaries, install to ~/bin, and build worker image"
dependencies = ["container-image"]
script_runner = "@shell"
script = ["scripts/build/install.sh"]

[tasks.install-debug]
description = "Same as install but with debug builds"
dependencies = ["container-image"]
env = { "UR_BUILD_PROFILE" = "debug" }
script_runner = "@shell"
script = ["scripts/build/install.sh"]

[tasks.ci]
description = "Run all CI checks"
dependencies = ["fmt", "clippy", "build", "test"]
