name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust workspace
        uses: ./.github/actions/setup
        with:
          components: rustfmt, clippy

      - name: Run CI checks
        run: cargo make ci

      - name: Stage workercmd binaries
        run: cargo make stage-workercmd-native

      - name: Build base container image
        run: docker build -t ur-worker-base:latest -f containers/claude-worker/Dockerfile.base containers/claude-worker

      - name: Build container image
        run: docker build -t ur-worker:latest containers/claude-worker

      - name: Run acceptance tests
        run: cargo test -p acceptance --features acceptance
        env:
          UR_CONTAINER: docker
