name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup workspace
        uses: ./.github/actions/setup

      - name: Run CI checks
        run: cargo make ci

      - name: Stage workercmd binaries
        run: cargo make stage-workercmd-native

      - name: Stage server binary
        run: cargo make stage-server-native

      - name: Download installer scripts
        run: |
          [ -f containers/claude-worker/install-claude.sh ] || curl -fsSL -o containers/claude-worker/install-claude.sh https://claude.ai/install.sh
          [ -f containers/claude-worker-rust/install-mise.sh ] || curl -fsSL -o containers/claude-worker-rust/install-mise.sh https://mise.jdx.dev/install.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build base container image
        uses: docker/build-push-action@v6
        with:
          context: containers/claude-worker
          file: containers/claude-worker/Dockerfile.base
          tags: ur-worker-base:latest
          load: true
          cache-from: type=gha,scope=worker-base
          cache-to: type=gha,mode=max,scope=worker-base

      - name: Build worker container image
        run: docker build -t ur-worker:latest containers/claude-worker

      - name: Build Rust worker container image
        uses: docker/build-push-action@v6
        with:
          context: containers/claude-worker-rust
          tags: ur-worker-rust:latest
          load: true
          cache-from: type=gha,scope=worker-rust
          cache-to: type=gha,mode=max,scope=worker-rust

      - name: Build server container image
        uses: docker/build-push-action@v6
        with:
          context: containers/server
          tags: ur-server:latest
          load: true
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Build squid container image
        uses: docker/build-push-action@v6
        with:
          context: containers/squid
          tags: ur-squid:latest
          load: true
          cache-from: type=gha,scope=squid
          cache-to: type=gha,mode=max,scope=squid

      - name: Run acceptance tests
        run: cargo test -p acceptance --features acceptance
        env:
          UR_CONTAINER: docker
