name: CI

on:
  workflow_dispatch:
  # push:
  #   branches: [master]
  # pull_request:
  #   branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup workspace
        uses: ./.github/actions/setup

      - name: Run CI checks
        run: cargo make ci

      - name: Check acceptance tests compile
        run: cargo check -p acceptance --features acceptance
