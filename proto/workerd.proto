syntax = "proto3";
package ur.workerd;

service WorkerDaemonService {
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  rpc NotifyIdle(NotifyIdleRequest) returns (NotifyIdleResponse);
  rpc Implement(ImplementRequest) returns (ImplementResponse);
  rpc AddressFeedbackTickets(AddressFeedbackRequest) returns (AddressFeedbackResponse);
  rpc StepComplete(StepCompleteRequest) returns (StepCompleteResponse);
}

message SendMessageRequest {
  string message = 1;
  // When true (or unset), workerd appends an Enter keypress after the literal
  // text via tmux send-keys. Set to false to send text without submitting.
  bool submit = 3;
}

message SendMessageResponse {
  bool success = 1;
  string error = 2;
}

message NotifyIdleRequest {}

message NotifyIdleResponse {}

message ImplementRequest {
  string ticket_id = 1;
}

message ImplementResponse {}

message AddressFeedbackRequest {
  string ticket_id = 1;
  uint32 pr_number = 2;
  // Comment IDs that have already had feedback tickets created in prior runs.
  // The worker should skip these when processing PR comments.
  repeated string handled_comment_ids = 3;
}

message AddressFeedbackResponse {}

message StepCompleteRequest {}

message StepCompleteResponse {}
