syntax = "proto3";

package ur.rag;

enum Language {
  LANGUAGE_UNSPECIFIED = 0;
  LANGUAGE_RUST = 1;
}

// RAG indexing and search service
service RagService {
  rpc RagIndex(RagIndexRequest) returns (stream RagIndexProgress);
  rpc RagSearch(RagSearchRequest) returns (RagSearchResponse);
}

message RagIndexRequest {
  Language language = 1;
}

message RagIndexProgress {
  oneof update {
    DependencyIndexed dependency_indexed = 1;
    IndexComplete index_complete = 2;
  }
}

message DependencyIndexed {
  string name = 1;
  uint32 files = 2;
  uint32 chunks = 3;
}

message IndexComplete {
  uint32 total_files = 1;
  uint32 total_chunks = 2;
}

message RagSearchRequest {
  string query = 1;
  Language language = 2;
  optional uint32 top_k = 3;
}

message RagSearchResponse {
  repeated RagSearchResult results = 1;
}

message RagSearchResult {
  string text = 1;
  string source_file = 2;
  float score = 3;
}
