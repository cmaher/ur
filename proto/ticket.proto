syntax = "proto3";

package ur.ticket;

service TicketService {
  rpc CreateTicket(CreateTicketRequest) returns (CreateTicketResponse);
  rpc ListTickets(ListTicketsRequest) returns (ListTicketsResponse);
  rpc GetTicket(GetTicketRequest) returns (GetTicketResponse);
  rpc UpdateTicket(UpdateTicketRequest) returns (UpdateTicketResponse);
  rpc SetMeta(SetMetaRequest) returns (SetMetaResponse);
  rpc DeleteMeta(DeleteMetaRequest) returns (DeleteMetaResponse);
  rpc AddBlock(AddBlockRequest) returns (AddBlockResponse);
  rpc RemoveBlock(RemoveBlockRequest) returns (RemoveBlockResponse);
  rpc AddLink(AddLinkRequest) returns (AddLinkResponse);
  rpc RemoveLink(RemoveLinkRequest) returns (RemoveLinkResponse);
  rpc AddActivity(AddActivityRequest) returns (AddActivityResponse);
  rpc ListActivities(ListActivitiesRequest) returns (ListActivitiesResponse);
  rpc DispatchableTickets(DispatchableTicketsRequest) returns (DispatchableTicketsResponse);
  rpc RedriveTicket(RedriveTicketRequest) returns (RedriveTicketResponse);
  rpc CreateWorkflow(CreateWorkflowRequest) returns (CreateWorkflowResponse);
  rpc CancelWorkflow(CancelWorkflowRequest) returns (CancelWorkflowResponse);
  rpc GetWorkflow(GetWorkflowRequest) returns (GetWorkflowResponse);
  rpc ListWorkflows(ListWorkflowsRequest) returns (ListWorkflowsResponse);
  rpc SubscribeUiEvents(SubscribeUiEventsRequest) returns (stream UiEventBatch);
  // Stream all ticket-domain rows as JSONL records for export/migration.
  rpc TicketExport(TicketExportRequest) returns (stream TicketExportRecord);
}

// --- Shared messages ---

message Ticket {
  string id = 1;
  string ticket_type = 2;
  string status = 3;
  int64 priority = 4;
  string parent_id = 5;
  string title = 6;
  string body = 7;
  string created_at = 8;
  string updated_at = 9;
  string project = 10;
  // Field 11 removed (was lifecycle_status).
  string branch = 12;
  // Field 13 removed (was lifecycle_managed).
  // Depth in the tree hierarchy (0 = root). Only set when using --tree queries.
  int32 depth = 14;
  // Number of children in a completed (closed) state.
  int32 children_completed = 15;
  // Total number of children.
  int32 children_total = 16;
  // Dispatch status: workflow lifecycle status if this ticket (or its parent) has an active workflow.
  string dispatch_status = 17;
}

message MetadataEntry {
  string key = 1;
  string value = 2;
}

message ActivityEntry {
  string id = 1;
  string timestamp = 2;
  string author = 3;
  string message = 4;
}

message ActivityMetadataEntry {
  string key = 1;
  string value = 2;
}

message ActivityDetail {
  ActivityEntry entry = 1;
  repeated ActivityMetadataEntry metadata = 2;
}

message DispatchableTicket {
  string id = 1;
  string title = 2;
  int64 priority = 3;
}

// --- CreateTicket ---

message CreateTicketRequest {
  string project = 1;
  string ticket_type = 2;
  string status = 3;
  int64 priority = 4;
  optional string parent_id = 5;
  string title = 6;
  string body = 7;
  // If set, use this ID instead of generating one (for migrations/imports).
  optional string id = 8;
  // If set, use this timestamp instead of now (for migrations/imports).
  optional string created_at = 9;
  // If true, set lifecycle_status to "design" (WIP ticket).
  bool wip = 10;
  // Optional branch name to associate with the ticket at creation time.
  optional string branch = 11;
}

message CreateTicketResponse {
  string id = 1;
}

// --- ListTickets ---

message ListTicketsRequest {
  optional string project = 1;
  optional string ticket_type = 2;
  optional string status = 3;
  // Field 4 removed (was parent_id, replaced by tree_root_id).
  optional string meta_key = 5;
  optional string meta_value = 6;
  // Field 7 removed (was lifecycle_status).
  // When set, return the root ticket and all descendants (recursive tree walk).
  optional string tree_root_id = 8;
  // Pagination: max results to return. When absent, return all.
  optional int32 page_size = 9;
  // Pagination: number of results to skip.
  optional int32 offset = 10;
  // When true, include child tickets in the result set.
  optional bool include_children = 11;
  // Filter by direct parent ticket ID.
  optional string parent_id = 12;
}

message ListTicketsResponse {
  repeated Ticket tickets = 1;
  int32 total_count = 2;
}

// --- GetTicket ---

message GetTicketRequest {
  string id = 1;
  optional string activity_author_filter = 2;
}

message GetTicketResponse {
  Ticket ticket = 1;
  repeated MetadataEntry metadata = 2;
  repeated ActivityEntry activities = 3;
}

// --- UpdateTicket ---

message UpdateTicketRequest {
  string id = 1;
  optional string status = 2;
  optional int64 priority = 3;
  optional string title = 4;
  optional string body = 5;
  bool force = 6;
  optional string ticket_type = 7;
  // Sentinel-based parent update:
  //   absent → leave parent unchanged
  //   "NONE" → clear parent (set to NULL)
  //   any other value → re-parent to that ticket ID
  optional string parent_id = 8;
  // Field 9 removed (was lifecycle_status).
  optional string branch = 10;
  optional string project = 11;
  // Field 12 removed (was lifecycle_managed).
}

message UpdateTicketResponse {
  // Non-empty when the ticket was re-keyed (e.g. project change).
  string new_id = 1;
}

// --- SetMeta ---

message SetMetaRequest {
  string ticket_id = 1;
  string key = 2;
  string value = 3;
}

message SetMetaResponse {}

// --- DeleteMeta ---

message DeleteMetaRequest {
  string ticket_id = 1;
  string key = 2;
}

message DeleteMetaResponse {}

// --- AddBlock ---

message AddBlockRequest {
  string blocker_id = 1;
  string blocked_id = 2;
}

message AddBlockResponse {}

// --- RemoveBlock ---

message RemoveBlockRequest {
  string blocker_id = 1;
  string blocked_id = 2;
}

message RemoveBlockResponse {}

// --- AddLink ---

message AddLinkRequest {
  string left_id = 1;
  string right_id = 2;
  // Edge kind: "relates_to" (default)
  optional string edge_kind = 3;
}

message AddLinkResponse {}

// --- RemoveLink ---

message RemoveLinkRequest {
  string left_id = 1;
  string right_id = 2;
}

message RemoveLinkResponse {}

// --- AddActivity ---

message AddActivityRequest {
  string ticket_id = 1;
  string author = 2;
  string message = 3;
  map<string, string> metadata = 4;
}

message AddActivityResponse {
  string activity_id = 1;
}

// --- ListActivities ---

message ListActivitiesRequest {
  string ticket_id = 1;
}

message ListActivitiesResponse {
  repeated ActivityDetail activities = 1;
}

// --- DispatchableTickets ---

message DispatchableTicketsRequest {
  string epic_id = 1;
  optional string project = 2;
}

message DispatchableTicketsResponse {
  repeated DispatchableTicket tickets = 1;
}

// --- RedriveTicket ---

message RedriveTicketRequest {
  string id = 1;
  string to_status = 2;
}

message RedriveTicketResponse {
  string lifecycle_status = 1;
}

// --- CreateWorkflow ---

message CreateWorkflowRequest {
  string ticket_id = 1;
  string status = 2;
}

message CreateWorkflowResponse {
  string workflow_id = 1;
}

// --- CancelWorkflow ---

message CancelWorkflowRequest {
  string ticket_id = 1;
}

message CancelWorkflowResponse {}

// --- WorkflowInfo ---

message WorkflowHistoryEvent {
  string event = 1;
  string created_at = 2;
}

message WorkflowInfo {
  string id = 1;
  string ticket_id = 2;
  string status = 3;
  bool stalled = 4;
  string stall_reason = 5;
  int64 implement_cycles = 6;
  string worker_id = 7;
  string feedback_mode = 8;
  string created_at = 9;
  string pr_url = 10;
  repeated WorkflowHistoryEvent history = 11;
  int64 ticket_children_open = 12;
  int64 ticket_children_closed = 13;
  string ticket_title = 14;
}

// --- GetWorkflow ---

message GetWorkflowRequest {
  string ticket_id = 1;
}

message GetWorkflowResponse {
  WorkflowInfo workflow = 1;
}

// --- ListWorkflows ---

message ListWorkflowsRequest {
  optional string status = 1;
  // Pagination: max results to return. When absent, return all.
  optional int32 page_size = 2;
  // Pagination: number of results to skip.
  optional int32 offset = 3;
  // Filter by project key.
  optional string project = 4;
}

message ListWorkflowsResponse {
  repeated WorkflowInfo workflows = 1;
  int32 total_count = 2;
}

// --- SubscribeUiEvents ---

enum UiEventType {
  UNKNOWN = 0;
  TICKET = 1;
  WORKFLOW = 2;
  WORKER = 3;
}

message UiEvent {
  UiEventType entity_type = 1;
  string entity_id = 2;
}

message UiEventBatch {
  repeated UiEvent events = 1;
}

message SubscribeUiEventsRequest {}

// --- TicketExport ---

message TicketExportRequest {}

// A single exported row. The `kind` field identifies the record type, and
// the `json` field contains the row serialized as a JSON object string.
// Consumers should parse `json` according to `kind`:
//   ticket        — ticket row
//   edge          — edge row (source_id, target_id, kind)
//   meta          — metadata row (entity_id, entity_type, key, value)
//   activity      — activity row
//   ticket_comment — ticket_comments row
message TicketExportRecord {
  string kind = 1;
  string json = 2;
}
