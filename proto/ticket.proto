syntax = "proto3";

package ur.ticket;

service TicketService {
  rpc CreateTicket(CreateTicketRequest) returns (CreateTicketResponse);
  rpc ListTickets(ListTicketsRequest) returns (ListTicketsResponse);
  rpc GetTicket(GetTicketRequest) returns (GetTicketResponse);
  rpc UpdateTicket(UpdateTicketRequest) returns (UpdateTicketResponse);
  rpc SetMeta(SetMetaRequest) returns (SetMetaResponse);
  rpc DeleteMeta(DeleteMetaRequest) returns (DeleteMetaResponse);
  rpc AddBlock(AddBlockRequest) returns (AddBlockResponse);
  rpc RemoveBlock(RemoveBlockRequest) returns (RemoveBlockResponse);
  rpc AddLink(AddLinkRequest) returns (AddLinkResponse);
  rpc RemoveLink(RemoveLinkRequest) returns (RemoveLinkResponse);
  rpc AddActivity(AddActivityRequest) returns (AddActivityResponse);
  rpc ListActivities(ListActivitiesRequest) returns (ListActivitiesResponse);
  rpc DispatchableTickets(DispatchableTicketsRequest) returns (DispatchableTicketsResponse);
}

// --- Shared messages ---

message Ticket {
  string id = 1;
  string ticket_type = 2;
  string status = 3;
  int64 priority = 4;
  string parent_id = 5;
  string title = 6;
  string body = 7;
  string created_at = 8;
  string updated_at = 9;
}

message MetadataEntry {
  string key = 1;
  string value = 2;
}

message ActivityEntry {
  string id = 1;
  string timestamp = 2;
  string author = 3;
  string message = 4;
}

message ActivityMetadataEntry {
  string key = 1;
  string value = 2;
}

message ActivityDetail {
  ActivityEntry entry = 1;
  repeated ActivityMetadataEntry metadata = 2;
}

message DispatchableTicket {
  string id = 1;
  string title = 2;
  int64 priority = 3;
}

// --- CreateTicket ---

message CreateTicketRequest {
  string project = 1;
  string ticket_type = 2;
  string status = 3;
  int64 priority = 4;
  optional string parent_id = 5;
  string title = 6;
  string body = 7;
}

message CreateTicketResponse {
  string id = 1;
}

// --- ListTickets ---

message ListTicketsRequest {
  optional string project = 1;
  optional string ticket_type = 2;
  optional string status = 3;
  optional string parent_id = 4;
  optional string meta_key = 5;
  optional string meta_value = 6;
}

message ListTicketsResponse {
  repeated Ticket tickets = 1;
}

// --- GetTicket ---

message GetTicketRequest {
  string id = 1;
}

message GetTicketResponse {
  Ticket ticket = 1;
  repeated MetadataEntry metadata = 2;
  repeated ActivityEntry activities = 3;
}

// --- UpdateTicket ---

message UpdateTicketRequest {
  string id = 1;
  optional string status = 2;
  optional int64 priority = 3;
  optional string title = 4;
  optional string body = 5;
}

message UpdateTicketResponse {}

// --- SetMeta ---

message SetMetaRequest {
  string ticket_id = 1;
  string key = 2;
  string value = 3;
}

message SetMetaResponse {}

// --- DeleteMeta ---

message DeleteMetaRequest {
  string ticket_id = 1;
  string key = 2;
}

message DeleteMetaResponse {}

// --- AddBlock ---

message AddBlockRequest {
  string blocker_id = 1;
  string blocked_id = 2;
}

message AddBlockResponse {}

// --- RemoveBlock ---

message RemoveBlockRequest {
  string blocker_id = 1;
  string blocked_id = 2;
}

message RemoveBlockResponse {}

// --- AddLink ---

message AddLinkRequest {
  string left_id = 1;
  string right_id = 2;
}

message AddLinkResponse {}

// --- RemoveLink ---

message RemoveLinkRequest {
  string left_id = 1;
  string right_id = 2;
}

message RemoveLinkResponse {}

// --- AddActivity ---

message AddActivityRequest {
  string ticket_id = 1;
  string author = 2;
  string message = 3;
  map<string, string> metadata = 4;
}

message AddActivityResponse {
  string activity_id = 1;
}

// --- ListActivities ---

message ListActivitiesRequest {
  string ticket_id = 1;
}

message ListActivitiesResponse {
  repeated ActivityDetail activities = 1;
}

// --- DispatchableTickets ---

message DispatchableTicketsRequest {
  string epic_id = 1;
}

message DispatchableTicketsResponse {
  repeated DispatchableTicket tickets = 1;
}
