syntax = "proto3";

package ur.ticket;

service TicketService {
  rpc CreateTicket(CreateTicketRequest) returns (CreateTicketResponse);
  rpc ListTickets(ListTicketsRequest) returns (ListTicketsResponse);
  rpc GetTicket(GetTicketRequest) returns (GetTicketResponse);
  rpc UpdateTicket(UpdateTicketRequest) returns (UpdateTicketResponse);
  rpc SetMeta(SetMetaRequest) returns (SetMetaResponse);
  rpc DeleteMeta(DeleteMetaRequest) returns (DeleteMetaResponse);
  rpc AddBlock(AddBlockRequest) returns (AddBlockResponse);
  rpc RemoveBlock(RemoveBlockRequest) returns (RemoveBlockResponse);
  rpc AddLink(AddLinkRequest) returns (AddLinkResponse);
  rpc RemoveLink(RemoveLinkRequest) returns (RemoveLinkResponse);
  rpc AddActivity(AddActivityRequest) returns (AddActivityResponse);
  rpc ListActivities(ListActivitiesRequest) returns (ListActivitiesResponse);
  rpc DispatchableTickets(DispatchableTicketsRequest) returns (DispatchableTicketsResponse);
  rpc RedriveTicket(RedriveTicketRequest) returns (RedriveTicketResponse);
  rpc CreateWorkflow(CreateWorkflowRequest) returns (CreateWorkflowResponse);
  rpc CancelWorkflow(CancelWorkflowRequest) returns (CancelWorkflowResponse);
}

// --- Shared messages ---

message Ticket {
  string id = 1;
  string ticket_type = 2;
  string status = 3;
  int64 priority = 4;
  string parent_id = 5;
  string title = 6;
  string body = 7;
  string created_at = 8;
  string updated_at = 9;
  string project = 10;
  // Field 11 removed (was lifecycle_status).
  string branch = 12;
  // Field 13 removed (was lifecycle_managed).
}

message MetadataEntry {
  string key = 1;
  string value = 2;
}

message ActivityEntry {
  string id = 1;
  string timestamp = 2;
  string author = 3;
  string message = 4;
}

message ActivityMetadataEntry {
  string key = 1;
  string value = 2;
}

message ActivityDetail {
  ActivityEntry entry = 1;
  repeated ActivityMetadataEntry metadata = 2;
}

message DispatchableTicket {
  string id = 1;
  string title = 2;
  int64 priority = 3;
}

// --- CreateTicket ---

message CreateTicketRequest {
  string project = 1;
  string ticket_type = 2;
  string status = 3;
  int64 priority = 4;
  optional string parent_id = 5;
  string title = 6;
  string body = 7;
  // If set, use this ID instead of generating one (for migrations/imports).
  optional string id = 8;
  // If set, use this timestamp instead of now (for migrations/imports).
  optional string created_at = 9;
  // If true, set lifecycle_status to "design" (WIP ticket).
  bool wip = 10;
}

message CreateTicketResponse {
  string id = 1;
}

// --- ListTickets ---

message ListTicketsRequest {
  optional string project = 1;
  optional string ticket_type = 2;
  optional string status = 3;
  optional string parent_id = 4;
  optional string meta_key = 5;
  optional string meta_value = 6;
  // Field 7 removed (was lifecycle_status).
}

message ListTicketsResponse {
  repeated Ticket tickets = 1;
}

// --- GetTicket ---

message GetTicketRequest {
  string id = 1;
}

message GetTicketResponse {
  Ticket ticket = 1;
  repeated MetadataEntry metadata = 2;
  repeated ActivityEntry activities = 3;
}

// --- UpdateTicket ---

message UpdateTicketRequest {
  string id = 1;
  optional string status = 2;
  optional int64 priority = 3;
  optional string title = 4;
  optional string body = 5;
  bool force = 6;
  optional string ticket_type = 7;
  // Sentinel-based parent update:
  //   absent → leave parent unchanged
  //   "NONE" → clear parent (set to NULL)
  //   any other value → re-parent to that ticket ID
  optional string parent_id = 8;
  // Field 9 removed (was lifecycle_status).
  optional string branch = 10;
  optional string project = 11;
  // Field 12 removed (was lifecycle_managed).
}

message UpdateTicketResponse {}

// --- SetMeta ---

message SetMetaRequest {
  string ticket_id = 1;
  string key = 2;
  string value = 3;
}

message SetMetaResponse {}

// --- DeleteMeta ---

message DeleteMetaRequest {
  string ticket_id = 1;
  string key = 2;
}

message DeleteMetaResponse {}

// --- AddBlock ---

message AddBlockRequest {
  string blocker_id = 1;
  string blocked_id = 2;
}

message AddBlockResponse {}

// --- RemoveBlock ---

message RemoveBlockRequest {
  string blocker_id = 1;
  string blocked_id = 2;
}

message RemoveBlockResponse {}

// --- AddLink ---

message AddLinkRequest {
  string left_id = 1;
  string right_id = 2;
  // Edge kind: "relates_to" (default), "follow_up"
  optional string edge_kind = 3;
}

message AddLinkResponse {}

// --- RemoveLink ---

message RemoveLinkRequest {
  string left_id = 1;
  string right_id = 2;
}

message RemoveLinkResponse {}

// --- AddActivity ---

message AddActivityRequest {
  string ticket_id = 1;
  string author = 2;
  string message = 3;
  map<string, string> metadata = 4;
}

message AddActivityResponse {
  string activity_id = 1;
}

// --- ListActivities ---

message ListActivitiesRequest {
  string ticket_id = 1;
}

message ListActivitiesResponse {
  repeated ActivityDetail activities = 1;
}

// --- DispatchableTickets ---

message DispatchableTicketsRequest {
  string epic_id = 1;
  optional string project = 2;
}

message DispatchableTicketsResponse {
  repeated DispatchableTicket tickets = 1;
}

// --- RedriveTicket ---

message RedriveTicketRequest {
  string id = 1;
  string to_status = 2;
}

message RedriveTicketResponse {
  string lifecycle_status = 1;
}

// --- CreateWorkflow ---

message CreateWorkflowRequest {
  string ticket_id = 1;
  string status = 2;
}

message CreateWorkflowResponse {
  string workflow_id = 1;
}

// --- CancelWorkflow ---

message CancelWorkflowRequest {
  string ticket_id = 1;
}

message CancelWorkflowResponse {}
