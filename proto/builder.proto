syntax = "proto3";
package ur.builder;
import "core.proto";

service BuilderDaemonService {
  rpc Exec(stream BuilderExecMessage) returns (stream ur.core.CommandOutput);
}

// Wrapper for bidi-streaming Exec RPC. The first message must contain a `start`
// frame; subsequent messages may carry `stdin` data for long-lived processes.
message BuilderExecMessage {
  oneof payload {
    BuilderExecRequest start = 1;
    bytes stdin = 2;
  }
}

message BuilderExecRequest {
  string command = 1;
  repeated string args = 2;
  // The working directory for the command. Accepts `%WORKSPACE%` template
  // variables which are resolved by the builder daemon to its local workspace
  // path. Actual resolution logic is handled separately from this proto definition.
  string working_dir = 3;
  map<string, string> env = 4;
  // When true, the process is expected to run indefinitely (e.g. a daemon).
  // The server should keep it in a process registry rather than waiting for exit.
  bool long_lived = 5;
}
