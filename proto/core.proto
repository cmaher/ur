syntax = "proto3";

package ur.core;

// Shared streaming message for CLI proxy services
message CommandOutput {
  oneof payload {
    bytes stdout = 1;
    bytes stderr = 2;
    int32 exit_code = 3;
    // Sent when a long-lived process is already running (e.g. reconnecting to
    // an existing daemon). The bool value is always true when present.
    bool already_running = 4;
  }
}

// Core always-on service
service CoreService {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc WorkerLaunch(WorkerLaunchRequest) returns (WorkerLaunchResponse);
  rpc WorkerStop(WorkerStopRequest) returns (WorkerStopResponse);
  rpc WorkerInfo(WorkerInfoRequest) returns (WorkerInfoResponse);
  rpc WorkerList(WorkerListRequest) returns (WorkerListResponse);
  rpc SendWorkerMessage(SendWorkerMessageRequest) returns (SendWorkerMessageResponse);
  rpc UpdateAgentStatus(UpdateAgentStatusRequest) returns (UpdateAgentStatusResponse);
}

message PingRequest {}
message PingResponse {
  string message = 1;
}

message WorkerLaunchRequest {
  string worker_id = 1;
  string image_id = 2;
  uint32 cpus = 3;
  string memory = 4;
  string workspace_dir = 5;
  // Claude Code credentials JSON blob, read from the host keychain by the CLI.
  string claude_credentials = 6;
  // Skills mode to use for the worker.
  string mode = 7;
  // Skills to install in the worker container.
  repeated string skills = 8;
  // Project key for repo pool launches (empty for raw workspace mounts).
  string project_key = 9;
}

message WorkerLaunchResponse {
  string container_id = 1;
}

message WorkerStopRequest {
  string worker_id = 1;
}

message WorkerStopResponse {}

message WorkerInfoRequest {
  string worker_id = 1;
}

message WorkerInfoResponse {
  string workspace_dir = 1;
}

message WorkerListRequest {}

message WorkerListResponse {
  repeated WorkerSummary workers = 1;
}

message SendWorkerMessageRequest {
  string worker_id = 1;
  string message = 2;
}

message SendWorkerMessageResponse {
  bool success = 1;
  string error = 2;
}

message UpdateAgentStatusRequest {
  string worker_id = 1;
  string status = 2;
  // Optional human-readable message (used by request-human to surface to the user).
  string message = 3;
}

message UpdateAgentStatusResponse {}

message WorkerSummary {
  string worker_id = 1;
  string worker_id_full = 2;
  string container_id = 3;
  string project_key = 4;
  string mode = 5;
  uint32 grpc_port = 6;
  string directory = 7;
  string container_status = 8;
  string agent_status = 9;
}
