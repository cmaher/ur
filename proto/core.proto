syntax = "proto3";

package ur.core;

// Shared streaming message for CLI proxy services
message CommandOutput {
  oneof payload {
    bytes stdout = 1;
    bytes stderr = 2;
    int32 exit_code = 3;
  }
}

// Core always-on service
service CoreService {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc ProcessLaunch(ProcessLaunchRequest) returns (ProcessLaunchResponse);
  rpc ProcessStop(ProcessStopRequest) returns (ProcessStopResponse);
}

message PingRequest {}
message PingResponse {
  string message = 1;
}

message ProcessLaunchRequest {
  string process_id = 1;
  string image_id = 2;
  uint32 cpus = 3;
  string memory = 4;
  string workspace_dir = 5;
  // Claude Code credentials JSON blob, read from the host keychain by the CLI.
  string claude_credentials = 6;
}

message ProcessLaunchResponse {
  string container_id = 1;
}

message ProcessStopRequest {
  string process_id = 1;
}

message ProcessStopResponse {}
